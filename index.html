<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GudangCloud Pro - Bagas Enterprise</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Libraries for Export & Scan -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCecJ__9CbCmYsk4l--2rtE8NO4MauNLrc",
            authDomain: "gudangbagas-9769d.firebaseapp.com",
            projectId: "gudangbagas-9769d",
            storageBucket: "gudangbagas-9769d.firebasestorage.app",
            messagingSenderId: "925542386415",
            appId: "1:925542386415:web:bf8d89af8169269e0a691a"
        };

        const appId = 'gudang-bagas-pro';

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            window.fb = { 
                auth, db, appId, 
                collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp, query, orderBy,
                onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut
            };
            window.dispatchEvent(new Event('firebase-ready'));
        } catch (e) {
            console.error(e);
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name, size, className]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            const [isLoginView, setIsLoginView] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [authLoading, setAuthLoading] = useState(false);

            const [items, setItems] = useState([]);
            const [transactions, setTransactions] = useState([]);
            
            const [showAddModal, setShowAddModal] = useState(false);
            const [showTxModal, setShowTxModal] = useState(false);
            const [showScanner, setShowScanner] = useState(false);
            const [txType, setTxType] = useState('in');
            const [search, setSearch] = useState('');

            const [filterMonth, setFilterMonth] = useState(new Date().getMonth() + 1);
            const [filterYear, setFilterYear] = useState(new Date().getFullYear());

            const [newItem, setNewItem] = useState({ name: '', category: '', stock: 0, unit: 'Pcs', minStock: 5, imageUrl: '', barcode: '' });
            const [newTx, setNewTx] = useState({ itemId: '', quantity: 1, note: '' });

            useEffect(() => {
                const init = () => {
                    if (!window.fb) return;
                    window.fb.onAuthStateChanged(window.fb.auth, (u) => {
                        setUser(u);
                        setLoading(false);
                    });
                };
                window.addEventListener('firebase-ready', init);
                if (window.fb) init();
                return () => window.removeEventListener('firebase-ready', init);
            }, []);

            useEffect(() => {
                if (!user || !window.fb) return;
                const itemsRef = window.fb.collection(window.fb.db, 'artifacts', window.fb.appId, 'public', 'data', 'items');
                const txRef = window.fb.collection(window.fb.db, 'artifacts', window.fb.appId, 'public', 'data', 'transactions');

                const unsubItems = window.fb.onSnapshot(itemsRef, (snap) => {
                    setItems(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                const unsubTx = window.fb.onSnapshot(txRef, (snap) => {
                    setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                });

                return () => { unsubItems(); unsubTx(); };
            }, [user]);

            const filteredTransactions = useMemo(() => {
                return transactions.filter(tx => {
                    if (!tx.createdAt) return false;
                    const date = tx.createdAt.toDate ? tx.createdAt.toDate() : new Date(tx.createdAt.seconds * 1000);
                    return (date.getMonth() + 1) === Number(filterMonth) && date.getFullYear() === Number(filterYear);
                });
            }, [transactions, filterMonth, filterYear]);

            const exportPDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const monthName = new Date(filterYear, filterMonth - 1).toLocaleString('id-ID', { month: 'long' });
                
                doc.setFontSize(16);
                doc.text("Laporan Transaksi GudangCloud Pro", 14, 15);
                doc.setFontSize(10);
                doc.text(`Periode: ${monthName} ${filterYear}`, 14, 22);

                const tableData = filteredTransactions.map(tx => {
                    const item = items.find(i => i.id === tx.itemId);
                    const date = tx.createdAt.toDate ? tx.createdAt.toDate().toLocaleDateString('id-ID') : '';
                    return [
                        date,
                        item ? item.name : 'Dihapus',
                        tx.type === 'in' ? 'MASUK' : 'KELUAR',
                        tx.quantity,
                        tx.user || '-'
                    ];
                });

                doc.autoTable({
                    head: [['Tanggal', 'Barang', 'Tipe', 'Jumlah', 'Oleh']],
                    body: tableData,
                    startY: 30,
                    theme: 'grid',
                    headStyles: { fillColor: [37, 99, 235] }
                });
                doc.save(`Laporan_${monthName}_${filterYear}.pdf`);
            };

            const exportExcel = () => {
                const dataToExport = filteredTransactions.map(tx => {
                    const item = items.find(i => i.id === tx.itemId);
                    const date = tx.createdAt.toDate ? tx.createdAt.toDate().toLocaleDateString('id-ID') : '';
                    return {
                        Tanggal: date,
                        Barang: item ? item.name : 'Dihapus',
                        Tipe: tx.type === 'in' ? 'Masuk' : 'Keluar',
                        Jumlah: tx.quantity,
                        Staff: tx.user,
                        Catatan: tx.note || ''
                    };
                });
                const ws = window.XLSX.utils.json_to_sheet(dataToExport);
                const wb = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(wb, ws, "Transaksi");
                window.XLSX.writeFile(wb, `Laporan_Transaksi_${filterMonth}_${filterYear}.xlsx`);
            };

            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthLoading(true);
                try {
                    if (isLoginView) await window.fb.signInWithEmailAndPassword(window.fb.auth, email, password);
                    else await window.fb.createUserWithEmailAndPassword(window.fb.auth, email, password);
                } catch (err) { alert("Gagal masuk. Periksa kembali."); }
                finally { setAuthLoading(false); }
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setNewItem({...newItem, imageUrl: reader.result});
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleAddItem = async (e) => {
                e.preventDefault();
                try {
                    await window.fb.addDoc(window.fb.collection(window.fb.db, 'artifacts', window.fb.appId, 'public', 'data', 'items'), { 
                        ...newItem, stock: Number(newItem.stock), minStock: Number(newItem.minStock), createdAt: window.fb.serverTimestamp() 
                    });
                    setShowAddModal(false);
                    setNewItem({ name: '', category: '', stock: 0, unit: 'Pcs', minStock: 5, imageUrl: '', barcode: '' });
                } catch (err) { alert("Gagal!"); }
            };

            const handleTransaction = async (e) => {
                e.preventDefault();
                const item = items.find(i => i.id === newTx.itemId);
                if (!item) return;
                const newStock = txType === 'in' ? item.stock + Number(newTx.quantity) : item.stock - Number(newTx.quantity);
                if (newStock < 0) return alert("Stok kurang!");
                
                await window.fb.addDoc(window.fb.collection(window.fb.db, 'artifacts', window.fb.appId, 'public', 'data', 'transactions'), {
                    ...newTx, type: txType, quantity: Number(newTx.quantity), user: user.email, createdAt: window.fb.serverTimestamp()
                });
                await window.fb.updateDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'public', 'data', 'items', item.id), { stock: newStock });
                setShowTxModal(false);
                setNewTx({ itemId: '', quantity: 1, note: '' });
            };

            if (loading) return <div className="h-screen flex items-center justify-center animate-pulse font-black text-blue-600 uppercase tracking-widest">GudangCloud Pro...</div>;

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center bg-slate-50 p-6">
                    <div className="w-full max-w-md bg-white rounded-[2.5rem] p-10 shadow-xl border border-slate-100 fade-in text-center">
                        <div className="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-100">
                            <Icon name="package" size={32} className="text-white" />
                        </div>
                        <h2 className="text-2xl font-black mb-2">{isLoginView ? 'Login Perusahaan' : 'Daftar Staff'}</h2>
                        <p className="text-slate-400 text-sm mb-8">GudangBagas</p>
                        
                        <form onSubmit={handleAuth} className="space-y-4 text-left">
                            <input required type="email" placeholder="Email" className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-600" value={email} onChange={e=>setEmail(e.target.value)} />
                            <input required type="password" placeholder="Password" className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-600" value={password} onChange={e=>setPassword(e.target.value)} />
                            <button className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-blue-100 hover:bg-blue-700 disabled:opacity-50" disabled={authLoading}>
                                {authLoading ? 'PROSES...' : (isLoginView ? 'MASUK' : 'DAFTAR')}
                            </button>
                        </form>
                        <button onClick={()=>setIsLoginView(!isLoginView)} className="mt-6 text-sm font-bold text-slate-400 hover:text-blue-600">
                            {isLoginView ? 'Butuh akun? Daftar' : 'Sudah ada akun? Login'}
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="flex flex-col md:flex-row min-h-screen">
                    {/* Sidebar */}
                    <aside className="w-full md:w-64 bg-slate-900 text-white p-6 flex flex-col">
                        <div className="flex items-center gap-3 mb-12">
                            <div className="bg-blue-600 p-2 rounded-xl"><Icon name="shield-check" size={24} /></div>
                            <span className="font-black text-xl tracking-tighter uppercase">GudangPro</span>
                        </div>
                        <nav className="space-y-2 flex-1">
                            {[
                                {id: 'dashboard', icon: 'layout', label: 'Dashboard'},
                                {id: 'inventory', icon: 'package', label: 'Inventory'},
                                {id: 'history', icon: 'clock', label: 'History'},
                                {id: 'reports', icon: 'file-text', label: 'Reports'}
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm transition-all ${activeTab === tab.id ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/50' : 'text-slate-400 hover:bg-slate-800'}`}>
                                    <Icon name={tab.icon} size={18} />
                                    <span>{tab.label}</span>
                                </button>
                            ))}
                        </nav>
                        <button onClick={() => window.fb.signOut(window.fb.auth)} className="mt-auto flex items-center gap-3 text-rose-400 font-bold p-4 hover:bg-rose-500/10 rounded-xl transition-colors">
                            <Icon name="log-out" size={18} /> Keluar
                        </button>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 p-6 md:p-10 max-h-screen overflow-y-auto custom-scroll bg-slate-50">
                        <header className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-10">
                            <div>
                                <h1 className="text-3xl font-black tracking-tight capitalize">{activeTab}</h1>
                                <p className="text-slate-400 text-sm font-medium">{user.email}</p>
                            </div>
                            <div className="flex gap-2 w-full sm:w-auto">
                                <button onClick={() => { setTxType('in'); setShowTxModal(true); }} className="flex-1 sm:flex-none bg-emerald-600 text-white px-4 py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2 shadow-lg shadow-emerald-100 transition-transform active:scale-95">
                                    <Icon name="plus" size={18}/> <span className="uppercase font-black tracking-wider text-[10px]">Barang Masuk</span>
                                </button>
                                <button onClick={() => { setTxType('out'); setShowTxModal(true); }} className="flex-1 sm:flex-none bg-rose-600 text-white px-4 py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2 shadow-lg shadow-rose-100 transition-transform active:scale-95">
                                    <Icon name="minus" size={18}/> <span className="uppercase font-black tracking-wider text-[10px]">Barang Keluar</span>
                                </button>
                            </div>
                        </header>

                        {activeTab === 'dashboard' && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 fade-in text-slate-800">
                                <div className="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                                    <div className="bg-blue-50 text-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center mb-4"><Icon name="box" size={24} /></div>
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Produk</p>
                                    <p className="text-4xl font-black mt-1">{items.length}</p>
                                </div>
                                <div className="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                                    <div className="bg-rose-50 text-rose-600 w-12 h-12 rounded-2xl flex items-center justify-center mb-4"><Icon name="alert-circle" size={24} /></div>
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Stok Kritis</p>
                                    <p className="text-4xl font-black mt-1 text-rose-600">{items.filter(i=>i.stock <= i.minStock).length}</p>
                                </div>
                                <div className="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                                    <div className="bg-emerald-50 text-emerald-600 w-12 h-12 rounded-2xl flex items-center justify-center mb-4"><Icon name="activity" size={24} /></div>
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Aktivitas Bulan Ini</p>
                                    <p className="text-4xl font-black mt-1">{filteredTransactions.length}</p>
                                </div>
                            </div>
                        )}

                        {activeTab === 'inventory' && (
                            <div className="bg-white rounded-[2rem] border border-slate-100 shadow-sm overflow-hidden fade-in">
                                <div className="p-6 border-b flex flex-col sm:flex-row justify-between items-stretch sm:items-center gap-4">
                                    <div className="relative flex-1 max-w-md">
                                        <Icon name="search" className="absolute left-4 top-3.5 text-slate-400" size={18} />
                                        <input type="text" placeholder="Cari nama barang..." className="w-full pl-12 pr-4 py-3 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600/20 transition-all font-medium" value={search} onChange={e=>setSearch(e.target.value)} />
                                    </div>
                                    <button onClick={() => setShowAddModal(true)} className="bg-slate-900 text-white px-8 py-3 rounded-2xl font-black text-sm hover:bg-black transition-all shadow-lg shadow-slate-200 uppercase tracking-widest">Barang Baru</button>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-sm">
                                        <thead className="bg-slate-50 text-[10px] uppercase font-black text-slate-400 tracking-widest border-b">
                                            <tr>
                                                <th className="px-8 py-5">Produk</th>
                                                <th className="px-8 py-5">Kategori</th>
                                                <th className="px-8 py-5">Stok Saat Ini</th>
                                                <th className="px-8 py-5">Status</th>
                                                <th className="px-8 py-5">Aksi</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {items.filter(i=>i.name.toLowerCase().includes(search.toLowerCase())).map(item => (
                                                <tr key={item.id} className="hover:bg-slate-50/50 transition-colors">
                                                    <td className="px-8 py-4">
                                                        <div className="flex items-center gap-4">
                                                            <div className="w-12 h-12 rounded-xl bg-slate-100 overflow-hidden border border-slate-200 flex-shrink-0">
                                                                {item.imageUrl ? <img src={item.imageUrl} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center"><Icon name="image" size={18} className="text-slate-300" /></div>}
                                                            </div>
                                                            <span className="font-bold text-slate-800">{item.name}</span>
                                                        </div>
                                                    </td>
                                                    <td className="px-8 py-4"><span className="text-[10px] font-black bg-blue-50 text-blue-600 px-3 py-1.5 rounded-lg uppercase tracking-tighter">{item.category}</span></td>
                                                    <td className="px-8 py-4 font-black text-lg">{item.stock} <span className="text-[10px] text-slate-400 font-bold uppercase">{item.unit}</span></td>
                                                    <td className="px-8 py-4">
                                                        {item.stock <= item.minStock ? (
                                                            <span className="text-rose-600 font-black text-[10px] uppercase tracking-tighter flex items-center gap-1"><Icon name="alert-triangle" size={12}/> Kritis</span>
                                                        ) : (
                                                            <span className="text-emerald-600 font-black text-[10px] uppercase tracking-tighter flex items-center gap-1"><Icon name="check-circle" size={12}/> Stabil</span>
                                                        )}
                                                    </td>
                                                    <td className="px-8 py-4">
                                                        <button onClick={()=>{ if(confirm('Hapus barang ini?')) window.fb.deleteDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'public', 'data', 'items', item.id))}} className="w-8 h-8 flex items-center justify-center text-rose-300 hover:text-rose-600 transition-colors"><Icon name="trash-2" size={16}/></button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                                                )}

                        {activeTab === 'history' && (
                            <div className="bg-white rounded-[2rem] border border-slate-100 shadow-sm overflow-hidden fade-in">
                                <div className="p-6 border-b"><h3 className="font-black text-lg">Riwayat Transaksi Terakhir</h3></div>
                                <div className="divide-y divide-slate-50">
                                    {transactions.slice(0, 50).map(tx => {
                                        const item = items.find(i => i.id === tx.itemId);
                                        const date = tx.createdAt ? (tx.createdAt.toDate ? tx.createdAt.toDate() : new Date(tx.createdAt.seconds * 1000)) : new Date();
                                        return (
                                            <div key={tx.id} className="p-6 flex items-center gap-6 hover:bg-slate-50 transition-all">
                                                <div className={`w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 ${tx.type === 'in' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}>
                                                    <Icon name={tx.type === 'in' ? 'arrow-down-left' : 'arrow-up-right'} size={20} />
                                                </div>
                                                <div className="flex-1 flex justify-between items-center">
                                                    <div>
                                                        <p className="font-black text-slate-800">{item ? item.name : 'Produk Dihapus'}</p>
                                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">{date.toLocaleDateString('id-ID', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'})} • {tx.user}</p>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className={`font-black text-lg ${tx.type === 'in' ? 'text-emerald-600' : 'text-rose-600'}`}>{tx.type === 'in' ? '+' : '-'}{tx.quantity}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {activeTab === 'reports' && (
                            <div className="fade-in space-y-6">
                                <div className="bg-white rounded-[2rem] p-8 border border-slate-100 shadow-sm">
                                    <h3 className="font-black text-xl mb-6">Filter Laporan Transaksi</h3>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 items-end">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Pilih Bulan</label>
                                            <select className="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none outline-none focus:ring-2 focus:ring-blue-600/20" value={filterMonth} onChange={e=>setFilterMonth(e.target.value)}>
                                                {Array.from({length: 12}, (_, i) => (
                                                    <option key={i+1} value={i+1}>{new Date(2000, i).toLocaleString('id-ID', {month: 'long'})}</option>
                                                ))}
                                            </select>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Pilih Tahun</label>
                                            <select className="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none outline-none focus:ring-2 focus:ring-blue-600/20" value={filterYear} onChange={e=>setFilterYear(e.target.value)}>
                                                {[2024, 2025, 2026].map(y => <option key={y} value={y}>{y}</option>)}
                                            </select>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={exportPDF} className="flex-1 bg-rose-600 text-white p-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-rose-100 hover:bg-rose-700 transition-all disabled:opacity-50 flex items-center justify-center gap-2" disabled={filteredTransactions.length === 0}>
                                                <Icon name="file-text" size={16} />
                                                UNDUH PDF
                                            </button>
                                            <button onClick={exportExcel} className="flex-1 bg-emerald-600 text-white p-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-emerald-100 hover:bg-emerald-700 transition-all disabled:opacity-50 flex items-center justify-center gap-2" disabled={filteredTransactions.length === 0}>
                                                <Icon name="file-spreadsheet" size={16} />
                                                UNDUH EXCEL
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                {/* PREVIEW LAPORAN */}
                                <div className="bg-white rounded-[2rem] border border-slate-100 shadow-sm overflow-hidden">
                                    <div className="p-6 border-b flex justify-between items-center bg-slate-50/50">
                                        <h3 className="font-black text-lg">Preview Tabel Laporan</h3>
                                        <span className="text-[10px] font-black text-blue-600 bg-blue-100 px-3 py-1 rounded-full uppercase">{filteredTransactions.length} Transaksi</span>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-sm">
                                            <thead className="bg-slate-50 text-[10px] uppercase font-black text-slate-400 tracking-widest border-b">
                                                <tr>
                                                    <th className="px-8 py-5">Tanggal</th>
                                                    <th className="px-8 py-5">Produk</th>
                                                    <th className="px-8 py-5">Tipe</th>
                                                    <th className="px-8 py-5">Jumlah</th>
                                                    <th className="px-8 py-5">Staff</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {filteredTransactions.map(tx => {
                                                    const item = items.find(i => i.id === tx.itemId);
                                                    const date = tx.createdAt ? (tx.createdAt.toDate ? tx.createdAt.toDate() : new Date(tx.createdAt.seconds * 1000)) : new Date();
                                                    return (
                                                        <tr key={tx.id} className="hover:bg-slate-50/50 transition-colors">
                                                            <td className="px-8 py-4 font-medium text-slate-500 whitespace-nowrap">{date.toLocaleDateString('id-ID')}</td>
                                                            <td className="px-8 py-4">
                                                                <div className="flex items-center gap-3">
                                                                    <div className="w-8 h-8 rounded-lg bg-slate-100 overflow-hidden flex-shrink-0">
                                                                        {item?.imageUrl && <img src={item.imageUrl} className="w-full h-full object-cover" />}
                                                                    </div>
                                                                    <span className="font-bold text-slate-800">{item ? item.name : 'Dihapus'}</span>
                                                                </div>
                                                            </td>
                                                            <td className="px-8 py-4">
                                                                <span className={`text-[10px] font-black px-2 py-1 rounded-md uppercase ${tx.type === 'in' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}>
                                                                    {tx.type === 'in' ? 'Masuk' : 'Keluar'}
                                                                </span>
                                                            </td>
                                                            <td className="px-8 py-4 font-black">{tx.quantity}</td>
                                                            <td className="px-8 py-4 text-xs font-bold text-slate-400 truncate max-w-[150px]">{tx.user}</td>
                                                        </tr>
                                                    );
                                                })}
                                                {filteredTransactions.length === 0 && (
                                                    <tr>
                                                        <td colSpan="5" className="px-8 py-20 text-center text-slate-300 font-black uppercase tracking-widest italic">Tidak ada data untuk periode ini</td>
                                                    </tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modal Add Item */}
                    {showAddModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
                            <div className="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl overflow-y-auto max-h-[95vh]">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="text-2xl font-black uppercase tracking-tighter">Registrasi Barang Baru</h3>
                                    <button onClick={()=>setShowAddModal(false)} className="text-slate-300 hover:text-slate-900 transition-colors"><Icon name="x" size={24} /></button>
                                </div>
                                <form onSubmit={handleAddItem} className="space-y-6">
                                    <div className="bg-slate-50 p-6 rounded-3xl border-2 border-dashed border-slate-200 text-center relative group">
                                        {newItem.imageUrl ? (
                                            <div className="relative inline-block">
                                                <img src={newItem.imageUrl} className="w-32 h-32 object-cover rounded-2xl shadow-md border-4 border-white" />
                                                <button type="button" onClick={() => setNewItem({...newItem, imageUrl: ''})} className="absolute -top-2 -right-2 bg-rose-500 text-white p-1 rounded-full shadow-lg"><Icon name="x" size={14}/></button>
                                            </div>
                                        ) : (
                                            <div className="py-4">
                                                <div className="w-16 h-16 bg-white rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-sm text-slate-400 group-hover:text-blue-500 transition-colors">
                                                    <Icon name="upload-cloud" size={28} />
                                                </div>
                                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Klik untuk Upload Foto Produk</p>
                                            </div>
                                        )}
                                        <input type="file" accept="image/*" className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onChange={handleImageUpload} />
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Nama Produk</label>
                                            <input required type="text" placeholder="Contoh: Meja Kerja" className="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600/20 font-bold" value={newItem.name} onChange={e=>setNewItem({...newItem, name: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Barcode / SKU</label>
                                            <input required type="text" placeholder="SKU-001" className="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600/20 font-bold" value={newItem.barcode} onChange={e=>setNewItem({...newItem, barcode: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Kategori</label>
                                            <input required type="text" placeholder="Elektronik" className="w-full p-4 bg-slate-50 rounded-2xl outline-none" value={newItem.category} onChange={e=>setNewItem({...newItem, category: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Satuan (Unit)</label>
                                            <input required type="text" placeholder="Pcs" className="w-full p-4 bg-slate-50 rounded-2xl outline-none" value={newItem.unit} onChange={e=>setNewItem({...newItem, unit: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Stok Awal</label>
                                            <input required type="number" className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-black text-xl" value={newItem.stock} onChange={e=>setNewItem({...newItem, stock: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Minimal Stok (Alert)</label>
                                            <input required type="number" className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-black text-xl text-rose-500" value={newItem.minStock} onChange={e=>setNewItem({...newItem, minStock: e.target.value})} />
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black shadow-xl hover:bg-black transition-all uppercase tracking-widest">SIMPAN BARANG</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Modal Transaction */}
                    {showTxModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
                            <div className="bg-white w-full max-md rounded-[2.5rem] p-8 shadow-2xl border-t-[12px]" style={{borderColor: txType === 'in' ? '#10b981' : '#f43f5e'}}>
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-2xl font-black uppercase tracking-tighter">Stok {txType === 'in' ? 'Masuk' : 'Keluar'}</h3>
                                    <button onClick={()=>setShowTxModal(false)} className="text-slate-300 hover:text-slate-900 transition-colors"><Icon name="x" size={24} /></button>
                                </div>
                                <form onSubmit={handleTransaction} className="space-y-5">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Pilih Produk</label>
                                        <select required className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-none focus:ring-2 focus:ring-slate-100" value={newTx.itemId} onChange={e=>setNewTx({...newTx, itemId: e.target.value})}>
                                            <option value="">-- Cari Barang --</option>
                                            {items.map(i => <option key={i.id} value={i.id}>{i.name} (Sisa: {i.stock})</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Jumlah</label>
                                        <input required type="number" min="1" placeholder="0" className="w-full p-5 bg-slate-50 rounded-2xl font-black text-4xl outline-none" value={newTx.quantity} onChange={e=>setNewTx({...newTx, quantity: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Catatan</label>
                                        <textarea placeholder="Keterangan transaksi..." className="w-full p-4 bg-slate-50 rounded-2xl outline-none text-sm font-medium h-24 resize-none" value={newTx.note} onChange={e=>setNewTx({...newTx, note: e.target.value})} />
                                    </div>
                                    <button type="submit" className={`w-full py-5 rounded-2xl font-black text-white shadow-xl transition-all uppercase tracking-widest ${txType === 'in' ? 'bg-emerald-600 hover:bg-emerald-700 shadow-emerald-100' : 'bg-rose-600 hover:bg-rose-700 shadow-rose-100'}`}>
                                        KONFIRMASI
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
